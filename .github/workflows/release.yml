name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build all platforms
        # Pass the triggering tag explicitly: actions/checkout replaces the
        # annotated tag with a lightweight one, so `git describe` can prefer
        # an older annotated tag on the same commit (v0.4.5 shipped binaries
        # reporting v0.4.4).
        run: make release-all VERSION=${GITHUB_REF_NAME}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
